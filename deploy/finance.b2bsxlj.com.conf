# finance.b2bsxlj.com → 反向代理到财务记账成品 finance.py（127.0.0.1:5600）
# 完整配置：含 443 + 证书 + 反代 + 80→443 跳转，直接覆盖即可，无需再跑 certbot。
# 用法：
#   cd /var/www/finance.b2bsxlj.com && git pull
#   cp /var/www/finance.b2bsxlj.com/deploy/finance.b2bsxlj.com.conf /etc/nginx/conf.d/finance.b2bsxlj.com.conf
#   nginx -t && systemctl reload nginx
#
# 前提：证书已由 certbot 签发在 /etc/letsencrypt/live/finance.b2bsxlj.com/（本机已具备）。

# HTTPS 主站：反代到 finance.py
server {
    listen 443 ssl;
    server_name finance.b2bsxlj.com;

    ssl_certificate     /etc/letsencrypt/live/finance.b2bsxlj.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finance.b2bsxlj.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;   # Excel 导入 / 语音音频上传留足空间

    # 实时同步（SSE）端点：关闭缓冲、加长超时
    location /api/stream {
        proxy_pass http://127.0.0.1:5600;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # 其余所有请求反代到 finance.py（它自己处理 / → 登录/App 跳转）
    location / {
        proxy_pass http://127.0.0.1:5600;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name finance.b2bsxlj.com;
    return 301 https://$host$request_uri;
}
