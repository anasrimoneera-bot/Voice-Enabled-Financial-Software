# 语音记账 App 的 Nginx 配置（部署到 finance.b2bsxlj.com）
# 用法：
#   cp /var/www/finance.b2bsxlj.com/deploy/finance.b2bsxlj.com.conf /etc/nginx/conf.d/finance.b2bsxlj.com.conf
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d finance.b2bsxlj.com --redirect     # 自动补全 443/证书/跳转
#
# 本文件只写 80 端口；HTTPS（443 + 证书 + 80→443 跳转）交给 certbot 自动注入。
server {
    listen 80;
    server_name finance.b2bsxlj.com;

    root  /var/www/finance.b2bsxlj.com;
    index index.html;
    charset utf-8;

    # 允许本站使用麦克风（语音识别所需）
    add_header Permissions-Policy "microphone=(self)";

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 可选：多设备云同步后端（需启动 server/server.js 监听 3001 才生效）
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存
    location ~* \.(?:css|js|svg|ico|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    access_log /var/log/nginx/finance.access.log;
    error_log  /var/log/nginx/finance.error.log;
}
