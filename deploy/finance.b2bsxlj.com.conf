# finance.b2bsxlj.com → 反向代理到已运行的财务记账成品（finance.py，监听 127.0.0.1:5600）
# 用法：
#   cp /var/www/finance.b2bsxlj.com/deploy/finance.b2bsxlj.com.conf /etc/nginx/conf.d/finance.b2bsxlj.com.conf
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d finance.b2bsxlj.com --redirect   # 自动补 443/证书/跳转
#
# 本文件只写 80 端口；HTTPS（443 + 证书 + 80→443 跳转）交给 certbot 自动注入。
server {
    listen 80;
    server_name finance.b2bsxlj.com;

    client_max_body_size 100m;   # Excel 导入 / 语音音频上传留足空间

    # 实时同步（SSE）端点：必须关闭缓冲、加长超时，否则实时刷新失效
    location /api/stream {
        proxy_pass http://127.0.0.1:5600;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # 其余所有请求反代到 finance.py（它自己处理 / → 登录/App 的跳转）
    location / {
        proxy_pass http://127.0.0.1:5600;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
