# Nginx 配置示例：将语音记账 APP 部署到 app.b2bsxlj.com
# 1. 将本仓库中的静态文件（index.html / style.css / app.js / manifest.webmanifest）
#    上传到服务器目录，例如 /var/www/app.b2bsxlj.com
# 2. 申请并配置该子域名的 SSL 证书（语音识别 API 必须在 HTTPS 下才能使用麦克风）
# 3. 将本文件放入 /etc/nginx/conf.d/app.b2bsxlj.com.conf 后 nginx -t && nginx -s reload

# HTTP -> HTTPS 跳转
server {
    listen 80;
    listen [::]:80;
    server_name app.b2bsxlj.com;
    return 301 https://$host$request_uri;
}

# HTTPS 站点
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.b2bsxlj.com;

    # 证书路径请替换为实际签发的证书（如 Let's Encrypt / 阿里云 / 腾讯云）
    ssl_certificate     /etc/nginx/ssl/app.b2bsxlj.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/app.b2bsxlj.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/app.b2bsxlj.com;
    index index.html;

    # 麦克风权限策略（允许本站使用麦克风）
    add_header Permissions-Policy "microphone=(self)";

    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA manifest 正确的 MIME 类型
    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
    }

    # 静态资源缓存
    location ~* \.(?:css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
